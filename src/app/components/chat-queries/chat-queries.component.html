<div class="chat-container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>List Chat</h2>
    <ul>
      <li
        *ngFor="let query of queries"
        (click)="startEditing(query)"
        [class.active]="query.id === editingQueryId"
      >
        {{ query.query }}
      </li>
    </ul>
  </div>

  <!-- Chat Section -->
  <div class="chat-section">
    <!-- Header -->
    <div class="header">
      <h3>Ask me anything</h3>
    </div>

    <!-- Messages -->
    <div class="chat-box">
      <div *ngFor="let query of queries">
        <!-- User Message -->
        <div class="message user d-flex align-items-center justify-content-end" *ngIf="query.query">
          <div class="bubble me-2">{{ query.query }}</div>
          <div class="actions d-flex">
            <!-- Edit Button -->
            <button
              class="btn btn-sm btn-outline-primary me-2"
              (click)="startEditing(query)"
              title="Edit"
            >
              <i class="fas fa-edit"></i>
            </button>
            <!-- Delete Button -->
            <button
              class="btn btn-sm btn-outline-danger"
              (click)="deleteQuery(query)"
              title="Delete"
            >
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
        </div>

        <!-- Bot Message -->
        <div class="message bot" *ngIf="query.response">
          <div class="bubble">{{ query.response }}</div>
        </div>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section d-flex">
      <input
        [(ngModel)]="newQuery.query"
        type="text"
        placeholder="Tu consulta es..."
        class="form-control me-2"
      />
      <button (click)="submitQuery()" class="btn btn-primary">
        {{ editingQueryId ? 'Actualizar' : 'Enviar' }}
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>
