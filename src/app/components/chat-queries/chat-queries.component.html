<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<div class="chat-container">
  <!-- Cabecera del chat -->
  <div class="chat-header">
    <h1><i class="fas fa-comments"></i> SmartTalk</h1>
  </div>

  <!-- Área de chat -->
  <div class="chat-box" id="chatBox">
    <div *ngFor="let query of queries" class="chat-message-group">
      <!-- Mensaje del usuario -->
      <div class="user-message">
        <p>{{ query.query }}</p>
        <i class="fas fa-pencil-alt edit-icon" (click)="editQuery(query)"></i>
      </div>
      <!-- Mensaje del bot -->
      <div class="bot-message">
        <p>{{ query.response }}</p>
      </div>
    </div>
  </div>

  <!-- Entrada del usuario -->
  <div class="chat-input-container">
    <input
      type="text"
      [(ngModel)]="newQuery.query"
      placeholder="Escribe tu mensaje..."
      class="chat-input"
    />
    <button (click)="submitQuery()" class="chat-send-btn">
      <!-- <i class="fas fa-paper-plane"></i> -->
    </button>
  </div>
</div>
