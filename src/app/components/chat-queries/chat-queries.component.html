<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<div class="d-flex h-100">
  <!-- Barra lateral -->
  <aside class="sidebar bg-dark text-white d-flex flex-column justify-content-between p-3">
    <div>
      <h2 class="text-center fw-bold mb-4">UNIOR</h2>
      <nav>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a href="#" class="nav-link text-white active">
              <i class="fas fa-comments me-2"></i> Chats
            </a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link text-white">
              <i class="fas fa-search me-2"></i> Search
            </a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link text-white">
              <i class="fas fa-cogs me-2"></i> Manage Plans
            </a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link text-white">
              <i class="fas fa-info-circle me-2"></i> Updates & FAQ
            </a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link text-white">
              <i class="fas fa-cog me-2"></i> Settings
            </a>
          </li>
        </ul>
      </nav>
    </div>
    <div class="mt-4">
      <div class="d-flex align-items-center mb-3">
        <img
          src="https://via.placeholder.com/50"
          alt="Profile"
          class="rounded-circle me-3"
          style="width: 50px; height: 50px;"
        />
        <div>
          <h6 class="mb-0">realthemes</h6>
          <small class="text-muted">Free</small>
        </div>
      </div>
      <button class="btn btn-primary w-100">View Plans</button>
    </div>
  </aside>

  <!-- Contenedor principal -->
  <main class="flex-fill bg-light d-flex flex-column">
    <!-- Encabezado -->
    <header class="d-flex justify-content-between align-items-center p-3 border-bottom bg-white">
      <h3 class="fw-bold"><i class="fas fa-robot me-2"></i> Code Generator</h3>
      <button class="btn btn-outline-secondary">Chat History</button>
    </header>

    <!-- Sección de chat -->
    <section class="d-flex flex-column h-100">
      <div class="chat-box-container flex-fill">
        <div *ngFor="let query of queries" class="mb-3">
          <!-- Mensaje del usuario (Pregunta) -->
          <div class="d-flex align-items-start user" *ngIf="query.query">
            <div class="me-3">
              <i class="fas fa-user-circle fa-2x text-primary"></i>
            </div>
            <div class="bg-primary text-white p-3 rounded shadow-sm">
              <p class="mb-0">{{ query.query }}</p>
            </div>
          </div>
          
          <!-- Mensaje del bot (Respuesta) -->
          <div class="d-flex align-items-start bot" *ngIf="query.response">
            <div class="ms-3">
              <i class="fas fa-robot fa-2x text-secondary"></i>
            </div>
            <div class="bg-secondary text-white p-3 rounded shadow-sm">
              <p class="mb-0">{{ query.response }}</p>
            </div>
            <div class="ms-3">
              <i class="fas fa-user-circle fa-2x text-primary"></i> <!-- Ícono de usuario alineado con la respuesta -->
            </div>
          </div>
        </div>
      </div>
      
      <!-- Entrada de texto -->
      <div class="border-top bg-white p-3">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            [(ngModel)]="newQuery.query"
            placeholder="Escribe tu mensaje..."
          />
          <button class="btn btn-primary" (click)="addOrUpdateQuery()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </section>
  </main>
</div>
